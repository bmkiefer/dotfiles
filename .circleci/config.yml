version: 2.1
jobs:
  build:
    macos:
      xcode: 26.3.0
    resource_class: m4pro.medium
    steps:
      - checkout
      - run:
          name: Run Setup Script
          command: ./setup_mac.sh
      - run:
          name: Re-run Setup Script (verify idempotency)
          command: ./setup_mac.sh
      - run:
          name: Verify Installed Tools
          command: ./verify_installed_mac_tools.sh

